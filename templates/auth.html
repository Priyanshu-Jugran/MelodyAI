<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MelodyAI — Sign In / Sign Up</title>
  <meta name="description" content="Sign in or create your MelodyAI account to start discovering music with AI." />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

<div class="auth-container">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
      </div>
      <span style="font-size:1.4rem;font-weight:800;letter-spacing:-0.5px;">Melody<span style="color:var(--accent)">AI</span></span>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <div class="auth-tab" id="tab-login" onclick="switchTab('login')">Sign In</div>
      <div class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</div>
    </div>

    <!-- LOGIN FORM -->
    <form id="form-login" onsubmit="handleLogin(event)" novalidate>
      <div class="form-group">
        <label class="form-label" for="login-username">Username</label>
        <input class="form-input" type="text" id="login-username" placeholder="Enter your username" autocomplete="username" />
        <span class="form-error" id="login-username-err">Username is required.</span>
      </div>
      <div class="form-group">
        <label class="form-label" for="login-password">Password</label>
        <input class="form-input" type="password" id="login-password" placeholder="Enter your password" autocomplete="current-password" />
        <span class="form-error" id="login-password-err">Password is required.</span>
      </div>
      <div class="form-error visible" id="login-general-err" style="margin-bottom:14px;display:none;"></div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:6px;" id="login-btn">
        Sign In
      </button>
      <p style="text-align:center;margin-top:18px;font-size:0.85rem;color:var(--text-muted);">
        Don't have an account? <span style="color:var(--accent);cursor:pointer;font-weight:600;" onclick="switchTab('signup')">Sign Up</span>
      </p>
    </form>

    <!-- SIGNUP FORM -->
    <form id="form-signup" onsubmit="handleSignup(event)" novalidate style="display:none;">
      <div class="form-group">
        <label class="form-label" for="signup-name">Display Name</label>
        <input class="form-input" type="text" id="signup-name" placeholder="How should we call you?" autocomplete="name" />
        <span class="form-error" id="signup-name-err">Name is required.</span>
      </div>
      <div class="form-group">
        <label class="form-label" for="signup-username">Username</label>
        <input class="form-input" type="text" id="signup-username" placeholder="Choose a username" autocomplete="username" />
        <span class="form-error" id="signup-username-err">Username is required.</span>
      </div>
      <div class="form-group">
        <label class="form-label" for="signup-password">Password</label>
        <input class="form-input" type="password" id="signup-password" placeholder="Create a password" autocomplete="new-password" />
        <span class="form-error" id="signup-password-err">Password must be at least 6 characters.</span>
      </div>
      <div class="form-error" id="signup-general-err" style="margin-bottom:14px;display:none;"></div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:6px;" id="signup-btn">
        Create Account
      </button>
      <p style="text-align:center;margin-top:18px;font-size:0.85rem;color:var(--text-muted);">
        Already have an account? <span style="color:var(--accent);cursor:pointer;font-weight:600;" onclick="switchTab('login')">Sign In</span>
      </p>
    </form>

  </div>
</div>

<div id="toast-container"></div>

<script src="/static/js/auth.js"></script>
</body>
</html>
